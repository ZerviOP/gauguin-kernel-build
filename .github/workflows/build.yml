name: CI

on:
  workflow_dispatch:

jobs:
  build-kernel:
    name: Build Kernel
    runs-on: ubuntu-22.04
    steps:
      - name: Build
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: https://github.com/ZerviOP/android_kernel_xiaomi_gauguin
          kernel-branch: lineage-23.2
          config: lito-perf_defconfig
          arch: arm64
          aosp-gcc: true
          aosp-clang: true
          android-version: 12
          aosp-clang-version: r383902          if [ ! -d clang/bin ]; then
            mkdir -p clang
            wget -q -O clang.tar.gz \
              https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r547379.tar.gz
            tar -xf clang.tar.gz -C clang
          fi

      # =======================
      # BUILD DEFCONFIG
      # =======================
      - name: Build Defconfig
        run: |
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          cd kernel
          make O=out ARCH=arm64 vendor/lito-perf_defconfig

      # =======================
      # BUILD KERNEL
      # =======================
      - name: Build Kernel
        run: |
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          cd kernel

          make O=out \
            ARCH=arm64 \
            CC=clang \
            LLVM=1 \
            LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            LD=ld.lld \
            -j$(nproc --all)

      # =======================
      # UPLOAD RESULT
      # =======================
      - name: Upload Kernel
        uses: actions/upload-artifact@v4
        with:
          name: kernel
          path: |
            kernel/out/arch/arm64/boot/Image*
            kernel/out/arch/arm64/boot/dtb*

name: Build Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            bc bison build-essential curl flex git \
            libelf-dev libssl-dev make python3 \
            device-tree-compiler cpio kmod \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            llvm lld clang

      # =======================
      # CLANG CACHE (FAST BUILD)
      # =======================
      - name: Cache Clang
        uses: actions/cache@v4
        with:
          path: clang
          key: clang-r547379-ubuntu-22.04

      - name: Download Official AOSP Clang (if missing)
        run: |
          if [ ! -d clang/bin ]; then
            mkdir -p clang
            wget -q -O clang.tar.gz \
              https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r547379.tar.gz
            tar -xf clang.tar.gz -C clang
          fi

      # =======================
      # BUILD DEFCONFIG
      # =======================
      - name: Build Defconfig
        run: |
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          cd kernel
          make O=out ARCH=arm64 vendor/lito-perf_defconfig

      # =======================
      # BUILD KERNEL
      # =======================
      - name: Build Kernel
        run: |
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          cd kernel

          make O=out \
            ARCH=arm64 \
            CC=clang \
            LLVM=1 \
            LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            LD=ld.lld \
            -j$(nproc --all)

      # =======================
      # UPLOAD RESULT
      # =======================
      - name: Upload Kernel
        uses: actions/upload-artifact@v4
        with:
          name: kernel
          path: |
            kernel/out/arch/arm64/boot/Image*
            kernel/out/arch/arm64/boot/dtb*

name: CI-noksu-llvm

on:
  workflow_dispatch:

jobs:
  build-kernel:
    name: Build Kernel
    runs-on: ubuntu-latest
    steps:
      - name: Build
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: https://github.com/bib56717-eng/android_kernel_xiaomi_gauguin
          kernel-branch: lineage-23.2
          config: gauguin_defconfig
          arch: arm64
          aosp-gcc: true
          other-clang-url: https://github.com/llvm/llvm-project
          other-clang-branch: main 
          anykernel3: true
      
